# Build the React/Vite frontend and publish to GitHub Pages.
# Backend is NOT on GitHub — deploy via render.yaml (see docs/DEPLOYMENT.md).
# Set repo variable VITE_API_BASE = https://<your-api-host>/api
# Enable: Settings → Pages → Source: GitHub Actions

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          # Project site: https://<user>.github.io/<repo>/
          VITE_BASE_URL: /${{ github.event.repository.name }}/
          # Optional: set repository variable VITE_API_BASE (e.g. https://api.example.com/api)
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
